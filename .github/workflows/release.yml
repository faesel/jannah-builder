name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION from tag $GITHUB_REF_NAME"

      - name: Validate version format
        run: |
          if ! echo "${{ steps.version.outputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag must be in the form vMAJOR.MINOR.PATCH (e.g. v2.2.0)"
            exit 1
          fi

      - name: Check version matches app.json
        run: |
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          if [ "$APP_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::app.json version ($APP_VERSION) does not match tag (${{ steps.version.outputs.version }}). Update app.json to match the tag before pushing."
            exit 1
          fi

  test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test

  build-android:
    needs: [validate, test]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify signing secrets are set
        run: |
          missing=0
          for s in ANDROID_KEYSTORE_B64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            case "$s" in
              ANDROID_KEYSTORE_B64) v="${{ secrets.ANDROID_KEYSTORE_B64 }}" ;;
              ANDROID_KEYSTORE_PASSWORD) v="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ;;
              ANDROID_KEY_ALIAS) v="${{ secrets.ANDROID_KEY_ALIAS }}" ;;
              ANDROID_KEY_PASSWORD) v="${{ secrets.ANDROID_KEY_PASSWORD }}" ;;
            esac
            if [ -z "$v" ]; then echo "::error::Required secret $s is missing."; missing=1; fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Compute Android versionCode from tag
        id: vc
        run: |
          # major*10000 + minor*100 + patch  ->  2.14.12 = 21412
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "versionCode=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "versionName $VERSION -> versionCode $VERSION_CODE"

      - name: Generate native Android project (expo prebuild)
        run: |
          # Bake the derived versionCode into app.json so prebuild emits it.
          node -e '
            const fs = require("fs");
            const app = JSON.parse(fs.readFileSync("app.json", "utf8"));
            app.expo.android = app.expo.android || {};
            app.expo.android.versionCode = ${{ steps.vc.outputs.versionCode }};
            fs.writeFileSync("app.json", JSON.stringify(app, null, 2));
          '
          npx expo prebuild --platform android --no-install

      - name: Configure release signing
        run: |
          # Decode the keystore next to the app module.
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > android/app/release.keystore
          # Inject a release signingConfig and point the release buildType at it.
          node scripts/patch-android-signing.js
          echo "--- signingConfigs / release buildType after patch ---"
          grep -nE "signingConfigs|signingConfig |storeFile|release \{" android/app/build.gradle || true

      - name: Build signed AAB + APK with Gradle
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew --no-daemon bundleRelease assembleRelease
          cd ..
          cp android/app/build/outputs/bundle/release/app-release.aab app-release.aab
          cp android/app/build/outputs/apk/release/app-release.apk app-release.apk
          ls -la app-release.aab app-release.apk

      - name: Verify signing fingerprint
        run: |
          EXPECTED="10:F5:8C:0C:FE:27:33:F7:D8:82:D2:BE:E8:DE:17:7F:A7:5D:72:F8"
          ACTUAL=$(keytool -printcert -jarfile app-release.aab 2>/dev/null | grep -i "SHA1:" | head -1 | sed 's/.*SHA1: *//' | tr -d ' ')
          echo "Expected upload key SHA1: $EXPECTED"
          echo "Actual   AAB      SHA1: $ACTUAL"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::AAB is signed with an unexpected key. Play Console will reject this upload."
            exit 1
          fi
          echo "Signature matches the registered Play upload key."

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: jannah-builder-v${{ needs.validate.outputs.version }}-aab
          path: app-release.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jannah-builder-v${{ needs.validate.outputs.version }}-apk
          path: app-release.apk

  create-release:
    needs: [validate, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: jannah-builder-v${{ needs.validate.outputs.version }}-aab

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: jannah-builder-v${{ needs.validate.outputs.version }}-apk

      - name: Rename artifacts
        run: |
          mv app-release.aab jannah-builder-v${{ needs.validate.outputs.version }}.aab
          mv app-release.apk jannah-builder-v${{ needs.validate.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Jannah Builder v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          files: |
            jannah-builder-v${{ needs.validate.outputs.version }}.aab
            jannah-builder-v${{ needs.validate.outputs.version }}.apk
