name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION from tag $GITHUB_REF_NAME"

      - name: Validate version format
        run: |
          if ! echo "${{ steps.version.outputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag must be in the form vMAJOR.MINOR.PATCH (e.g. v2.2.0)"
            exit 1
          fi

      - name: Check version matches app.json
        run: |
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          if [ "$APP_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::app.json version ($APP_VERSION) does not match tag (${{ steps.version.outputs.version }}). Update app.json to match the tag before pushing."
            exit 1
          fi

  test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test

  build-android:
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify EXPO_TOKEN is set
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::EXPO_TOKEN secret is missing. Create a token at https://expo.dev/settings/access-tokens and add it as an Actions secret named EXPO_TOKEN."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # EAS builds on Expo's servers and signs with the EAS-managed release
      # keystore, producing a Play-Store-ready (release-signed) artifact.
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build release-signed AAB + APK on EAS
        run: |
          set -uo pipefail
          # Enqueue both builds without waiting so they enter the queue
          # back-to-back and share a single queue window. Enqueuing is
          # sequential (a few seconds each) to avoid racing on the working
          # directory; the actual builds then run back-to-back on the free
          # tier without paying the queue wait twice.
          eas build --platform android --profile production --non-interactive --no-wait --json > eas-aab.json
          eas build --platform android --profile preview --non-interactive --no-wait --json > eas-apk.json
          AAB_ID=$(node -p "require('./eas-aab.json')[0].id")
          APK_ID=$(node -p "require('./eas-apk.json')[0].id")
          echo "Enqueued builds — AAB=$AAB_ID  APK=$APK_ID"

          # Poll a build until it finishes; fail on errored/canceled.
          poll_build() {
            local id="$1" label="$2" i status
            for i in $(seq 1 180); do   # up to ~3h at 60s intervals
              eas build:view "$id" --json > view.json 2>/dev/null || echo '{}' > view.json
              status=$(node -e "let s='';try{s=(JSON.parse(require('fs').readFileSync('view.json','utf8')).status||'').toString().toLowerCase()}catch(e){};console.log(s)")
              echo "[$label] status: ${status:-unknown} (check $i)"
              case "$status" in
                finished) return 0 ;;
                errored|canceled|cancelled) echo "::error::$label build $id ended with status: $status"; return 1 ;;
              esac
              sleep 60
            done
            echo "::error::$label build $id did not finish in time"; return 1
          }

          poll_build "$AAB_ID" AAB || exit 1
          poll_build "$APK_ID" APK || exit 1

          # Resolve artifact URLs from the finished builds and download them.
          AAB_URL=$(eas build:view "$AAB_ID" --json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).artifacts.applicationArchiveUrl")
          APK_URL=$(eas build:view "$APK_ID" --json | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).artifacts.applicationArchiveUrl")
          if [ -z "$AAB_URL" ] || [ "$AAB_URL" = "undefined" ] || [ "$AAB_URL" = "null" ]; then
            echo "::error::Could not resolve the AAB download URL."; exit 1
          fi
          if [ -z "$APK_URL" ] || [ "$APK_URL" = "undefined" ] || [ "$APK_URL" = "null" ]; then
            echo "::error::Could not resolve the APK download URL."; exit 1
          fi
          echo "Downloading AAB from $AAB_URL"
          curl -fL -o app-release.aab "$AAB_URL"
          echo "Downloading APK from $APK_URL"
          curl -fL -o app-release.apk "$APK_URL"
          ls -la app-release.aab app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: jannah-builder-v${{ needs.validate.outputs.version }}-aab
          path: app-release.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jannah-builder-v${{ needs.validate.outputs.version }}-apk
          path: app-release.apk

  create-release:
    needs: [validate, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: jannah-builder-v${{ needs.validate.outputs.version }}-aab

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: jannah-builder-v${{ needs.validate.outputs.version }}-apk

      - name: Rename artifacts
        run: |
          mv app-release.aab jannah-builder-v${{ needs.validate.outputs.version }}.aab
          mv app-release.apk jannah-builder-v${{ needs.validate.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Jannah Builder v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          files: |
            jannah-builder-v${{ needs.validate.outputs.version }}.aab
            jannah-builder-v${{ needs.validate.outputs.version }}.apk
