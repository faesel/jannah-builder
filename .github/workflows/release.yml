name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION from tag $GITHUB_REF_NAME"

      - name: Validate version format
        run: |
          if ! echo "${{ steps.version.outputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag must be in the form vMAJOR.MINOR.PATCH (e.g. v2.2.0)"
            exit 1
          fi

      - name: Check version matches app.json
        run: |
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          if [ "$APP_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::app.json version ($APP_VERSION) does not match tag (${{ steps.version.outputs.version }}). Update app.json to match the tag before pushing."
            exit 1
          fi

  test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test

  build-android:
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify EXPO_TOKEN is set
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "::error::EXPO_TOKEN secret is missing. Create a token at https://expo.dev/settings/access-tokens and add it as an Actions secret named EXPO_TOKEN."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # EAS builds on Expo's servers and signs with the EAS-managed release
      # keystore, producing a Play-Store-ready (release-signed) artifact.
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build release-signed AAB + APK on EAS
        run: |
          set -uo pipefail
          # Submit both builds in parallel so they share a single queue window.
          # On the free tier they still run back-to-back (1 concurrent build),
          # but the APK is already queued while the AAB builds — avoiding a
          # second full queue wait and roughly halving total release time.
          eas build --platform android --profile production --non-interactive --wait --json > eas-aab.json 2> aab.log &
          AAB_PID=$!
          eas build --platform android --profile preview --non-interactive --wait --json > eas-apk.json 2> apk.log &
          APK_PID=$!

          wait "$AAB_PID"; AAB_RC=$?
          wait "$APK_PID"; APK_RC=$?

          echo "===== AAB build log ====="; cat aab.log || true
          echo "===== APK build log ====="; cat apk.log || true

          if [ "$AAB_RC" -ne 0 ]; then
            echo "::error::AAB (production) build failed — see the AAB build log above."
            exit 1
          fi
          if [ "$APK_RC" -ne 0 ]; then
            echo "::error::APK (preview) build failed — see the APK build log above."
            exit 1
          fi

      - name: Download AAB from EAS
        run: |
          URL=$(node -p "require('./eas-aab.json')[0].artifacts.applicationArchiveUrl")
          if [ -z "$URL" ] || [ "$URL" = "undefined" ]; then
            echo "::error::Could not resolve the AAB download URL from EAS output."
            cat eas-aab.json
            exit 1
          fi
          echo "Downloading AAB from $URL"
          curl -fL -o app-release.aab "$URL"
          ls -la app-release.aab

      - name: Download APK from EAS
        run: |
          URL=$(node -p "require('./eas-apk.json')[0].artifacts.applicationArchiveUrl")
          if [ -z "$URL" ] || [ "$URL" = "undefined" ]; then
            echo "::error::Could not resolve the APK download URL from EAS output."
            cat eas-apk.json
            exit 1
          fi
          echo "Downloading APK from $URL"
          curl -fL -o app-release.apk "$URL"
          ls -la app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: jannah-builder-v${{ needs.validate.outputs.version }}-aab
          path: app-release.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jannah-builder-v${{ needs.validate.outputs.version }}-apk
          path: app-release.apk

  create-release:
    needs: [validate, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: jannah-builder-v${{ needs.validate.outputs.version }}-aab

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: jannah-builder-v${{ needs.validate.outputs.version }}-apk

      - name: Rename artifacts
        run: |
          mv app-release.aab jannah-builder-v${{ needs.validate.outputs.version }}.aab
          mv app-release.apk jannah-builder-v${{ needs.validate.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Jannah Builder v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          files: |
            jannah-builder-v${{ needs.validate.outputs.version }}.aab
            jannah-builder-v${{ needs.validate.outputs.version }}.apk
