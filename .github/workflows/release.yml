name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2.2.0)'
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in semver format (e.g. 2.2.0)"
            exit 1
          fi

      - name: Check version matches app.json
        run: |
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          if [ "$APP_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::app.json version ($APP_VERSION) does not match requested version (${{ inputs.version }}). Update app.json first."
            exit 1
          fi

  test:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean

      - name: Export JS bundle
        run: npx expo export --platform android

      - name: Copy bundle to Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp -r dist/* android/app/src/main/assets/

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Configure signing
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        working-directory: android
        run: |
          cat >> gradle.properties <<EOF
          RELEASE_STORE_FILE=release.keystore
          RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release AAB (Play Store)
        working-directory: android
        run: ./gradlew app:bundleRelease

      - name: Build release APK
        working-directory: android
        run: ./gradlew app:assembleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: jannah-builder-v${{ inputs.version }}-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jannah-builder-v${{ inputs.version }}-apk
          path: android/app/build/outputs/apk/release/app-release.apk

  create-release:
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: jannah-builder-v${{ inputs.version }}-aab

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: jannah-builder-v${{ inputs.version }}-apk

      - name: Rename artifacts
        run: |
          mv app-release.aab jannah-builder-v${{ inputs.version }}.aab
          mv app-release.apk jannah-builder-v${{ inputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Jannah Builder v${{ inputs.version }}
          generate_release_notes: true
          files: |
            jannah-builder-v${{ inputs.version }}.aab
            jannah-builder-v${{ inputs.version }}.apk
